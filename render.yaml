services:
  # Бэкенд (Django)
  - type: web
    name: habr-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/tags/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATA_DIR
        value: "/app/data"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000"
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1

  # Фронтенд (Preact)
  - type: web
    name: habr-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: habr-backend
          type: web
          property: host
          envVarKey: BACKEND_HOST
